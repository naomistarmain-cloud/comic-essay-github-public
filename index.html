<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コミックエッセイ</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111;
      --panel: rgba(20, 20, 20, 0.88);
      --text: #f7f4ee;
      --muted: #b9b1a5;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #d8b46a;
      --topbar-h: 58px;
      --nav-h: 64px;
      --page-gap: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: var(--topbar-h);
      padding: calc(8px + env(safe-area-inset-top)) 16px 8px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.86), rgba(0, 0, 0, 0.42), transparent);
      pointer-events: none;
    }

    .back {
      pointer-events: auto;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
    }

    .title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
    }

    .counter {
      flex: 0 0 auto;
      min-width: 72px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      pointer-events: auto;
    }

    .viewer {
      height: 100vh;
      height: 100svh;
      display: flex;
      flex-direction: row-reverse;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding: calc(var(--topbar-h) + env(safe-area-inset-top)) var(--page-gap) calc(var(--nav-h) + env(safe-area-inset-bottom));
      scrollbar-color: var(--accent) #27221a;
      scrollbar-width: thin;
    }

    .page {
      flex: 0 0 calc(100vw - var(--page-gap) * 2);
      min-width: 0;
      height: calc(100vh - var(--topbar-h) - var(--nav-h) - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      height: calc(100svh - var(--topbar-h) - var(--nav-h) - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }

    .page img {
      display: block;
      max-width: min(100%, calc(100vw - var(--page-gap) * 2));
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      background: #050505;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.52);
      user-select: none;
      -webkit-user-drag: none;
    }

    .nav {
      position: fixed;
      inset: auto 0 calc(12px + env(safe-area-inset-bottom));
      z-index: 6;
      display: flex;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
    }

    button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--panel);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    @media (max-width: 640px) {
      :root {
        --topbar-h: 54px;
        --nav-h: 58px;
        --page-gap: 10px;
      }

      .topbar {
        gap: 8px;
        padding-inline: 10px;
      }

      .back {
        font-size: 12px;
        padding-inline: 8px;
      }

      .title {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="./コミックエッセイ.pdf">PDF</a>
    <div class="title">コミックエッセイ</div>
    <div class="counter" id="counter">1 / 9</div>
  </header>

  <main class="viewer" id="viewer" aria-label="漫画ビューア"></main>

  <nav class="nav" aria-label="ページ移動">
    <button id="prev" type="button" aria-label="前のページ">‹</button>
    <button id="next" type="button" aria-label="次のページ">›</button>
  </nav>

  <script>
    const imageFiles = [
      "pages-small/page_001.jpg",
      "pages-small/page_002.jpg",
      "pages-small/page_003.jpg",
      "pages-small/page_004.jpg",
      "pages-small/page_005.jpg",
      "pages-small/page_006.jpg",
      "pages-small/page_007.jpg",
      "pages-small/page_008.jpg",
      "pages-small/page_009.jpg"
    ];
    const viewer = document.getElementById("viewer");
    const counter = document.getElementById("counter");
    let currentIndex = 0;

    imageFiles.forEach((fileName, index) => {
      const page = document.createElement("section");
      page.className = "page";
      page.dataset.index = String(index);

      const img = document.createElement("img");
      img.src = encodeURI(fileName);
      img.alt = fileName.replace(/\.[^.]+$/, "");
      img.loading = index < 2 ? "eager" : "lazy";

      page.appendChild(img);
      viewer.appendChild(page);
    });

    function pages() {
      return [...viewer.querySelectorAll(".page")];
    }

    function nearestPageIndex() {
      const center = viewer.scrollLeft + viewer.clientWidth / 2;
      let best = currentIndex;
      let distance = Infinity;

      pages().forEach((page, index) => {
        const pageCenter = page.offsetLeft + page.clientWidth / 2;
        const nextDistance = Math.abs(center - pageCenter);
        if (nextDistance < distance) {
          distance = nextDistance;
          best = index;
        }
      });

      return best;
    }

    function updateCounter(index = nearestPageIndex()) {
      currentIndex = index;
      counter.textContent = `${currentIndex + 1} / ${imageFiles.length}`;
    }

    function go(delta) {
      const nextIndex = Math.max(0, Math.min(imageFiles.length - 1, currentIndex + delta));
      pages()[nextIndex].scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      updateCounter(nextIndex);
    }

    document.getElementById("prev").addEventListener("click", () => go(1));
    document.getElementById("next").addEventListener("click", () => go(-1));

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") go(1);
      if (event.key === "ArrowRight") go(-1);
    });

    let touchStartX = 0;
    let touchStartY = 0;

    viewer.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    viewer.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      const isHorizontalSwipe = Math.abs(deltaX) > 54 && Math.abs(deltaX) > Math.abs(deltaY) * 1.4;

      if (!isHorizontalSwipe) {
        updateCounter();
        return;
      }

      if (deltaX > 0) {
        go(1);
      } else {
        go(-1);
      }
    }, { passive: true });

    viewer.addEventListener("wheel", (event) => {
      if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
        event.preventDefault();
        viewer.scrollLeft -= event.deltaY;
      }
    }, { passive: false });

    viewer.addEventListener("scroll", () => {
      window.requestAnimationFrame(() => updateCounter());
    }, { passive: true });

    window.addEventListener("load", () => {
      pages()[0].scrollIntoView({ inline: "center", block: "nearest" });
      updateCounter(0);
    });
  </script>
</body>
</html>
